name: Update Arista Configs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  update-all-configs:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Random delay
      run: sleep $((RANDOM % 300 + 60))

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pyyaml aiohttp

    - name: Clean old config files
      run: |
        rm -rf configs.txt/
        mkdir -p configs.txt/telegram configs.txt/github configs.txt/combined

    - name: Clean old yaml files
      run: |
        rm -rf config.yaml/
        mkdir -p config.yaml

    - name: Clean old json files
      run: |
        rm -rf config.json/
        mkdir -p config.json

    - name: Run Telegram Config Extractor
      run: python telegram_extractor.py
      timeout-minutes: 20

    - name: Run GitHub Config Extractor
      run: python github_extractor.py
      timeout-minutes: 15

    - name: Combine Configs
      run: python combine_configs.py

    - name: Convert to YAML (Clash Meta)
      run: python convert_to_yaml.py

    - name: Convert to JSON (Sing-Box)
      run: python convert_to_json.py

    - name: Create summary
      run: |
        date > last_update.txt
        echo "Updated: $(date -u '+%Y-%m-%d %H:%M UTC')" > update_info.txt

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Stage all changes
      run: git add .

    - name: Check for changes
      id: check_changes
      run: |
        if git diff --cached --quiet; then
          echo "changes=false" >> $GITHUB_OUTPUT
        else
          echo "changes=true" >> $GITHUB_OUTPUT
        fi

    - name: Commit changes
      if: steps.check_changes.outputs.changes == 'true'
      run: |
        git commit -m "🔄 Configs update $(date -u '+%Y-%m-%d %H:%M UTC')"

    - name: Push changes (safe mode)
      if: steps.check_changes.outputs.changes == 'true'
      run: |
        git fetch origin main
        git rebase origin/main || true
        git push origin HEAD:main
